<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Milestone 0 validation terminal screenshot</title>
  <desc id="desc">Terminal-style PR validation artifact showing Milestone 0 checks passing on branch feat/milestone-0-project-baseline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.38" />
    </filter>
  </defs>
  <rect width="960" height="540" fill="#e5e7eb" />
  <rect x="54" y="44" width="852" height="452" rx="18" fill="url(#bg)" filter="url(#shadow)" />
  <rect x="54" y="44" width="852" height="52" rx="18" fill="#1f2937" />
  <circle cx="86" cy="70" r="7" fill="#ef4444" />
  <circle cx="112" cy="70" r="7" fill="#f59e0b" />
  <circle cx="138" cy="70" r="7" fill="#22c55e" />
  <text x="480" y="76" text-anchor="middle" fill="#cbd5e1" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">gameunjang-agi — Milestone 0 PR validation</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="22">
    <text x="86" y="140" fill="#38bdf8">$</text>
    <text x="120" y="140" fill="#e5e7eb">git branch --show-current</text>
    <text x="120" y="178" fill="#a7f3d0">feat/milestone-0-project-baseline</text>

    <text x="86" y="226" fill="#38bdf8">$</text>
    <text x="120" y="226" fill="#e5e7eb">git diff --check</text>
    <text x="120" y="264" fill="#a7f3d0">PASS</text>

    <text x="86" y="312" fill="#38bdf8">$</text>
    <text x="120" y="312" fill="#e5e7eb">Milestone 0 shell validation</text>
    <text x="120" y="350" fill="#a7f3d0">PASS</text>

    <text x="86" y="398" fill="#38bdf8">$</text>
    <text x="120" y="398" fill="#e5e7eb">code-reviewer</text>
    <text x="120" y="436" fill="#a7f3d0">No blocking findings</text>

    <text x="86" y="474" fill="#38bdf8">✓</text>
    <text x="120" y="474" fill="#e5e7eb">Milestone 0 checklist: </text>
    <text x="462" y="474" fill="#a7f3d0">completed</text>
  </g>
</svg>

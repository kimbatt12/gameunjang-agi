name: Data refresh

on:
  schedule:
    - cron: "17 19 * * 0"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    name: Validate and promote data snapshot
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install backend validation dependencies
        run: python -m pip install -e ".[dev]"

      - name: Generate staging snapshot
        run: python -m tools.data_refresh generate-staging

      - name: Validate staging snapshot
        run: python -m tools.data_refresh validate-staging

      - name: Smoke staging snapshot
        run: python -m tools.data_refresh smoke-staging

      - name: Promote only validated snapshot
        run: python -m tools.data_refresh promote

      - name: Validate promoted current snapshot
        run: python -m tools.data_refresh validate-current

      - name: Smoke promoted current snapshot
        run: python -m tools.data_refresh smoke-current

      - name: Upload refresh artifacts
        uses: actions/upload-artifact@v4
        with:
          name: data-refresh-artifacts
          path: |
            data/artifacts/
            data/current/
            data/staging/manifest.json

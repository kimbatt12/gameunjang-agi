name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate frontend package
        run: |
          if [ -f frontend/package.json ]; then
            npm ci --prefix frontend
            for script in lint typecheck test build; do
              if node -e "const pkg = require('./frontend/package.json'); process.exit(pkg.scripts && pkg.scripts[process.argv[1]] ? 0 : 1)" "$script"; then
                npm run "$script" --prefix frontend
              else
                echo "skip: frontend package has no $script script"
              fi
            done
          else
            echo "skip: frontend/package.json does not exist"
          fi

      - name: Validate backend Node package
        run: |
          # Backend stack is not fixed yet. Only run npm checks when backend is a Node package.
          if [ -f backend/package.json ]; then
            npm ci --prefix backend
            for script in lint typecheck test build; do
              if node -e "const pkg = require('./backend/package.json'); process.exit(pkg.scripts && pkg.scripts[process.argv[1]] ? 0 : 1)" "$script"; then
                npm run "$script" --prefix backend
              else
                echo "skip: backend package has no $script script"
              fi
            done
          else
            if [ -d backend ]; then
              echo "skip: backend is present without package.json; add stack-specific CI when selected"
            else
              echo "skip: backend/package.json does not exist"
            fi
          fi
